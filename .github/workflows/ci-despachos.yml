# ============================================================
# CI/CD Pipeline — Backend Despachos (Spring Boot)
# ISY1101 — Introducción a Herramientas DevOps
# Etapas: build → test → push (Docker Hub) → deploy (EC2)
# ============================================================

name: CI/CD — Backend Despachos

on:
  push:
    branches:
      - main
    paths:
      - "back-despachos/**"
      - ".github/workflows/ci-despachos.yml"
  pull_request:
    branches:
      - main
    paths:
      - "back-despachos/**"

env:
  IMAGE_NAME: api_despachos

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: BUILD & TEST
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🔨 Compilar y ejecutar tests con Maven
        working-directory: ./back-despachos
        run: mvn clean verify -B

      - name: 📊 Publicar resultados de tests (JUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-despachos
          path: back-despachos/target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: DOCKER BUILD & PUSH
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extraer metadatos (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🐳 Build y Push de imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: ./back-despachos
          file: ./back-despachos/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: DEPLOY A EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy a AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Detener y eliminar contenedor anterior si existe
            sudo docker stop back-despachos 2>/dev/null || true
            sudo docker rm back-despachos 2>/dev/null || true

            # Descargar la imagen más reciente
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:latest

            # Ejecutar el nuevo contenedor con variables de entorno seguras
            sudo docker run -d \
              --name back-despachos \
              --restart unless-stopped \
              -p 8081:8081 \
              -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:latest

            # Verificar que el contenedor está corriendo
            sleep 10
            sudo docker ps | grep back-despachos
            echo "✅ Backend Despachos desplegado correctamente"
