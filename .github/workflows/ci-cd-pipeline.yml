# ============================================================
# CI/CD Pipeline — Despliegue Completo (todos los servicios)
# ISY1101 — Introducción a Herramientas DevOps
# Etapas: build → test → push (Docker Hub) → deploy (EC2)
# Se activa cuando hay cambios en cualquier componente
# ============================================================

name: CI/CD — Pipeline Completo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: TEST & BUILD — Backend Ventas
  # ─────────────────────────────────────────────
  test-ventas:
    name: "🔨 Test Backend Ventas (Maven)"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🧪 Compilar y testear
        working-directory: ./back-ventas
        run: mvn clean verify -B

      - name: 📊 Subir reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-ventas
          path: back-ventas/target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: TEST & BUILD — Backend Despachos
  # ─────────────────────────────────────────────
  test-despachos:
    name: "🔨 Test Backend Despachos (Maven)"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🧪 Compilar y testear
        working-directory: ./back-despachos
        run: mvn clean verify -B

      - name: 📊 Subir reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-despachos
          path: back-despachos/target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: BUILD — Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: "🏗️ Build Frontend (Vite)"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front_despacho/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: ./front_despacho
        run: npm ci --frozen-lockfile

      - name: 🔍 Lint
        working-directory: ./front_despacho
        run: npm run lint || true

      - name: 🏗️ Build producción
        working-directory: ./front_despacho
        run: npm run build

      - name: 📦 Subir artefacto dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front_despacho/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: DOCKER PUSH — Todas las imágenes
  # ─────────────────────────────────────────────
  docker-push:
    name: "🐳 Docker Build & Push → DockerHub"
    runs-on: ubuntu-latest
    needs: [test-ventas, test-despachos, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build & Push — Backend Ventas
        uses: docker/build-push-action@v6
        with:
          context: ./back-ventas
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api_ventas:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api_ventas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & Push — Backend Despachos
        uses: docker/build-push-action@v6
        with:
          context: ./back-despachos
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & Push — Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front_despacho
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 5: DEPLOY → AWS EC2
  # ─────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy → AWS EC2 (3.226.125.108)"
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            # Crear directorio del proyecto
            mkdir -p /home/ubuntu/proyecto-eft
            cd /home/ubuntu/proyecto-eft

            # Crear docker-compose de producción
            cat > docker-compose.yml << 'COMPOSE_EOF'
            version: '3.8'
            services:
              db:
                image: mysql:8.0
                container_name: mysql-db
                restart: unless-stopped
                environment:
                  MYSQL_ROOT_PASSWORD: $DB_PASSWORD
                  MYSQL_DATABASE: $DB_NAME
                  MYSQL_USER: $DB_USERNAME
                  MYSQL_PASSWORD: $DB_PASSWORD
                volumes:
                  - mysql_data:/var/lib/mysql
                networks:
                  - app-network
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$DB_PASSWORD"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 30s

              back-ventas:
                image: $DOCKERHUB_USERNAME/api_ventas:latest
                container_name: back-ventas
                restart: unless-stopped
                environment:
                  DB_ENDPOINT: db
                  DB_PORT: 3306
                  DB_NAME: $DB_NAME
                  DB_USERNAME: $DB_USERNAME
                  DB_PASSWORD: $DB_PASSWORD
                ports:
                  - "8080:8080"
                networks:
                  - app-network
                depends_on:
                  db:
                    condition: service_healthy

              back-despachos:
                image: $DOCKERHUB_USERNAME/api_despachos:latest
                container_name: back-despachos
                restart: unless-stopped
                environment:
                  DB_ENDPOINT: db
                  DB_PORT: 3306
                  DB_NAME: $DB_NAME
                  DB_USERNAME: $DB_USERNAME
                  DB_PASSWORD: $DB_PASSWORD
                ports:
                  - "8081:8081"
                networks:
                  - app-network
                depends_on:
                  db:
                    condition: service_healthy

              frontend:
                image: $DOCKERHUB_USERNAME/frontend_despacho:latest
                container_name: frontend
                restart: unless-stopped
                ports:
                  - "80:80"
                networks:
                  - app-network
                depends_on:
                  - back-ventas
                  - back-despachos

            volumes:
              mysql_data:
            networks:
              app-network:
                driver: bridge
            COMPOSE_EOF

            # Crear .env con las variables de entorno
            cat > .env << ENV_EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            ENV_EOF

            # Login a Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Descargar imágenes nuevas
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api_ventas:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:latest

            # Levantar todos los servicios con docker compose
            sudo docker compose --env-file .env up -d --remove-orphans

            # Verificar estado de los contenedores
            sleep 15
            sudo docker compose ps

            echo ""
            echo "✅ Despliegue completado exitosamente en http://${{ secrets.EC2_HOST }}"
            echo "   Frontend:          http://${{ secrets.EC2_HOST }}"
            echo "   API Ventas:        http://${{ secrets.EC2_HOST }}:8080/swagger-ui.html"
            echo "   API Despachos:     http://${{ secrets.EC2_HOST }}:8081/swagger-ui.html"
