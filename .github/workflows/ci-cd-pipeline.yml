name: CI/CD Pipeline Completo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─── JOB 1: Tests Maven (Ventas + Despachos) y Build Frontend ───
  build-and-test:
    name: Build y Test (Maven + Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Test Backend Ventas
        working-directory: ./back-ventas
        run: mvn clean verify -B

      - name: Test Backend Despachos
        working-directory: ./back-despachos
        run: mvn clean verify -B

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front_despacho/package-lock.json

      - name: Instalar dependencias Frontend
        working-directory: ./front_despacho
        run: npm ci --frozen-lockfile

      - name: Build Frontend
        working-directory: ./front_despacho
        run: npm run build

      - name: Subir reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            back-ventas/target/surefire-reports/
            back-despachos/target/surefire-reports/
          retention-days: 7

  # ─── JOB 2: Docker Build & Push a Docker Hub ───
  docker-push:
    name: Docker Build y Push a DockerHub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen Backend Ventas
        uses: docker/build-push-action@v6
        with:
          context: ./back-ventas
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api_ventas:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api_ventas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push imagen Backend Despachos
        uses: docker/build-push-action@v6
        with:
          context: ./back-despachos
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push imagen Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front_despacho
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: Deploy a AWS EC2 via SSH ───
  deploy:
    name: Deploy a AWS EC2
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            mkdir -p /home/ubuntu/proyecto-eft
            cd /home/ubuntu/proyecto-eft

            cat > docker-compose.yml << 'COMPOSE_EOF'
            version: "3.8"
            services:
              db:
                image: mysql:8.0
                container_name: mysql-db
                restart: unless-stopped
                environment:
                  MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
                  MYSQL_DATABASE: ${DB_NAME}
                  MYSQL_USER: ${DB_USERNAME}
                  MYSQL_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - mysql_data:/var/lib/mysql
                networks:
                  - app-network
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
                  interval: 15s
                  timeout: 5s
                  retries: 5
                  start_period: 40s

              back-ventas:
                image: ${DOCKERHUB_USERNAME}/api_ventas:latest
                container_name: back-ventas
                restart: unless-stopped
                environment:
                  DB_ENDPOINT: db
                  DB_PORT: 3306
                  DB_NAME: ${DB_NAME}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                ports:
                  - "8080:8080"
                networks:
                  - app-network
                depends_on:
                  db:
                    condition: service_healthy

              back-despachos:
                image: ${DOCKERHUB_USERNAME}/api_despachos:latest
                container_name: back-despachos
                restart: unless-stopped
                environment:
                  DB_ENDPOINT: db
                  DB_PORT: 3306
                  DB_NAME: ${DB_NAME}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                ports:
                  - "8081:8081"
                networks:
                  - app-network
                depends_on:
                  db:
                    condition: service_healthy

              frontend:
                image: ${DOCKERHUB_USERNAME}/frontend_despacho:latest
                container_name: frontend
                restart: unless-stopped
                ports:
                  - "80:80"
                networks:
                  - app-network
                depends_on:
                  - back-ventas
                  - back-despachos

            volumes:
              mysql_data:
            networks:
              app-network:
                driver: bridge
            COMPOSE_EOF

            cat > .env << ENV_EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            ENV_EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api_ventas:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api_despachos:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:latest

            sudo docker compose --env-file .env up -d --remove-orphans

            sleep 20
            sudo docker compose ps

            echo "Deploy completado en http://${{ secrets.EC2_HOST }}"
