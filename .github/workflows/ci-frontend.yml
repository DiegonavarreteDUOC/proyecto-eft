# ============================================================
# CI/CD Pipeline — Frontend React/Vite
# ISY1101 — Introducción a Herramientas DevOps
# Etapas: build → push (Docker Hub) → deploy (EC2)
# ============================================================

name: CI/CD — Frontend

on:
  push:
    branches:
      - main
    paths:
      - "front_despacho/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches:
      - main
    paths:
      - "front_despacho/**"

env:
  IMAGE_NAME: frontend_despacho

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: BUILD (Vite)
  # ─────────────────────────────────────────────
  build:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front_despacho/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: ./front_despacho
        run: npm ci --frozen-lockfile

      - name: 🔍 Ejecutar Lint
        working-directory: ./front_despacho
        run: npm run lint || true

      - name: 🏗️ Compilar para producción
        working-directory: ./front_despacho
        run: npm run build

      - name: 📦 Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front_despacho/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: DOCKER BUILD & PUSH
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🔧 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extraer metadatos (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🐳 Build y Push de imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: DEPLOY A EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy a AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Detener y eliminar contenedor anterior si existe
            sudo docker stop frontend 2>/dev/null || true
            sudo docker rm frontend 2>/dev/null || true

            # Descargar la imagen más reciente
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:latest

            # Ejecutar el nuevo contenedor
            sudo docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/frontend_despacho:latest

            # Verificar que el contenedor está corriendo
            sleep 5
            sudo docker ps | grep frontend
            echo "✅ Frontend desplegado correctamente"
